<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 16px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .header svg {
      width: 24px;
      height: 24px;
      color: #ff4757;
    }

    .header h1 {
      font-size: 16px;
      font-weight: 600;
    }

    .content {
      padding: 16px;
    }

    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      border-radius: 8px;
      margin-bottom: 12px;
      font-size: 13px;
    }

    .status.supported {
      background: rgba(46, 213, 115, 0.12);
      color: #2ed573;
    }

    .status.unsupported {
      background: rgba(255, 71, 87, 0.12);
      color: #ff6b81;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .status.supported .status-dot { background: #2ed573; }
    .status.unsupported .status-dot { background: #ff6b81; }

    .url-preview {
      font-size: 12px;
      color: #888;
      padding: 8px 12px;
      background: rgba(255,255,255,0.04);
      border-radius: 6px;
      margin-bottom: 12px;
      word-break: break-all;
      max-height: 48px;
      overflow: hidden;
    }

    .options {
      margin-bottom: 12px;
    }

    .option-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 0;
    }

    .option-label {
      font-size: 13px;
      color: #ccc;
    }

    .toggle {
      position: relative;
      width: 36px;
      height: 20px;
      appearance: none;
      -webkit-appearance: none;
      background: #444;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.2s;
      border: none;
      outline: none;
    }

    .toggle:checked { background: #5352ed; }

    .toggle::before {
      content: "";
      position: absolute;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      top: 2px;
      left: 2px;
      background: white;
      transition: transform 0.2s;
    }

    .toggle:checked::before { transform: translateX(16px); }

    .btn {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: opacity 0.2s;
    }

    .btn:hover { opacity: 0.9; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-primary {
      background: #5352ed;
      color: white;
    }

    .btn svg {
      width: 18px;
      height: 18px;
    }

    .footer {
      padding: 8px 16px 12px;
      text-align: center;
      font-size: 11px;
      color: #666;
    }
  </style>
</head>
<body>
  <div class="header">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M10 15l5.19-3L10 9v6m11.56-7.83c.13.47.22 1.1.28 1.9.07.8.1 1.49.1 2.09L22 12c0 2.19-.16 3.8-.44 4.83-.25.9-.83 1.48-1.73 1.73-.47.13-1.33.22-2.65.28-1.3.07-2.49.1-3.59.1L12 19c-4.19 0-6.8-.16-7.83-.44-.9-.25-1.48-.83-1.73-1.73-.13-.47-.22-1.1-.28-1.9-.07-.8-.1-1.49-.1-2.09L2 12c0-2.19.16-3.8.44-4.83.25-.9.83-1.48 1.73-1.73.47-.13 1.33-.22 2.65-.28 1.3-.07 2.49-.1 3.59-.1L12 5c4.19 0 6.8.16 7.83.44.9.25 1.48.83 1.73 1.73z"/></svg>
    <h1>YDL GUI</h1>
  </div>

  <div class="content">
    <div id="status" class="status unsupported">
      <div class="status-dot"></div>
      <span id="status-text">Checking...</span>
    </div>

    <div id="url-preview" class="url-preview" style="display:none"></div>

    <div class="options">
      <div class="option-row">
        <span class="option-label">Send cookies</span>
        <input type="checkbox" class="toggle" id="send-cookies" checked>
      </div>
    </div>

    <button class="btn btn-primary" id="send-btn" disabled>
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 19H5V5h7V3H5a2 2 0 00-2 2v14a2 2 0 002 2h14c1.1 0 2-.9 2-2v-7h-2v7zM14 3v2h3.59l-9.83 9.83 1.41 1.41L19 6.41V10h2V3h-7z"/></svg>
      <span id="btn-text">Open in YDL GUI</span>
    </button>
  </div>

  <div class="footer">
    Click to send this page to YDL GUI app
  </div>

  <script src="popup.js"></script>
</body>
</html>
